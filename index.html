  <style>
    /* Critical above-the-fold for splash */
    html, body { background: #f4f8f5; margin: 0; }
    #splash { position: fixed; inset: 0; display: grid; place-items: center; z-index: 9999; transition: opacity 360ms ease;
      background: radial-gradient(1200px 600px at 50% -10%, #e9f7ee 0%, #f4f8f5 55%, #eef6f0 100%); }
    #splash.gone { opacity: 0; pointer-events: none; }
    #splash .box { text-align: center; animation: rise 600ms cubic-bezier(.2,.7,.2,1) both; }
    #splash .logo { width: 168px; height: auto; display: block; margin: 0 auto; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 14px 30px rgba(31, 120, 60, 0.18)); }
    #splash .lbl { margin-top: 22px; color: #5a6478; font: 500 14px/1.4 "IBM Plex Sans Thai", system-ui; letter-spacing: .2px; }
    #splash .bar { margin: 18px auto 0; width: 200px; height: 4px; border-radius: 99px; background: #dfe7f3; overflow: hidden; position: relative; }
    /* Material-style indeterminate: 2 แท่งซ้อนกันต่อเนื่อง — มีแท่งวิ่งตลอดเวลา ไม่มีช่องว่าง/รีสตาร์ทกระตุก */
    #splash .bar::before, #splash .bar::after { content: ""; position: absolute; top: 0; bottom: 0; left: 0; border-radius: 99px;
      background: linear-gradient(90deg, #2e8b4a, #43a05f); will-change: left, right; }
    #splash .bar::before { animation: indet1 2.1s cubic-bezier(.65,.815,.735,.395) infinite; }
    #splash .bar::after  { animation: indet2 2.1s cubic-bezier(.165,.84,.44,1) infinite; animation-delay: 1.05s; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes indet1 { 0% { left: -35%; right: 100%; } 60% { left: 100%; right: -90%; } 100% { left: 100%; right: -90%; } }
    @keyframes indet2 { 0% { left: -200%; right: 100%; } 60% { left: 107%; right: -8%; } 100% { left: 107%; right: -8%; } }
    .no-anim *, .no-anim *:before, .no-anim *:after { animation-duration: 0ms !important; transition: none !important; }
  </style>
</head>

  <script>
    // Hide splash once React mounts
    const obs = new MutationObserver(() => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        const sp = document.getElementById('splash');
        if (sp) {
          sp.classList.add('gone');
          setTimeout(() => sp.remove(), 400);
        }
        obs.disconnect();
      }
    });
    obs.observe(document.getElementById('root'), { childList: true });
    setTimeout(() => { const sp = document.getElementById('splash'); if (sp) { sp.classList.add('gone'); setTimeout(() => sp.remove(), 400); } }, 4000);
  </script>
